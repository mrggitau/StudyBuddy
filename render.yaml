services:
  - type: web
    name: studybuddy-backend
    runtime: node
    repo: https://github.com/mrggitau/StudyBuddy
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: your_db_host_here
      - key: DB_USER
        value: your_db_user_here
      - key: DB_PASSWORD
        value: your_db_password_here
      - key: DB_NAME
        value: studybuddy_db
      - key: JWT_SECRET
        value: your_super_secret_key